name: quality-gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  web-app-check:
    name: web app checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect package.json
        id: detect
        shell: bash
        run: |
          if [ -f package.json ]; then
            echo "has_package=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_package=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_package == 'true'
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        if: steps.detect.outputs.has_package == 'true'
        run: npm ci

      - name: Typecheck
        if: steps.detect.outputs.has_package == 'true'
        run: npm run typecheck --if-present

      - name: Lint
        if: steps.detect.outputs.has_package == 'true'
        run: npm run lint --if-present

      - name: Unit tests
        if: steps.detect.outputs.has_package == 'true'
        run: npm test --if-present

      - name: Build
        if: steps.detect.outputs.has_package == 'true'
        run: npm run build --if-present

      - name: Install Playwright browsers
        if: steps.detect.outputs.has_package == 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: E2E smoke tests
        if: steps.detect.outputs.has_package == 'true'
        run: npm run test:e2e --if-present

      - name: No package yet
        if: steps.detect.outputs.has_package != 'true'
        run: echo "package.json is not present yet. Skipping app checks."

  semgrep:
    name: semgrep sast
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep community rules
        run: semgrep scan --config p/default --sarif --output semgrep.sarif .
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
